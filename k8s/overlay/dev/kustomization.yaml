apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base
  - namespace.yaml

patchesStrategicMerge:
  - patch.yaml

images:
  - name: express-backend
    newName: imronrosadii/express-backend
    newTag: dev
  - name: react-frontend
    newName: imronrosadii/react-frontend
    newTag: dev

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - CORS_ORIGIN=*
