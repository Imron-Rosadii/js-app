apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base
  - namespace.yaml

patchesStrategicMerge:
  - patch.yaml

images:
  - name: express-backend
    newName: imronrosadii/express-backend
    newTag: staging
  - name: react-frontend
    newName: imronrosadii/react-frontend
    newTag: staging

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=info
