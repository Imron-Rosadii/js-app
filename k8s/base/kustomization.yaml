apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - secret.yaml # ← Pakai file secret.yaml langsung
  - database.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: js-app
  app.kubernetes.io/version: 1.0.0

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - API_VERSION=v1
      - LOG_FORMAT=json

