apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  # namespace akan ditambahkan oleh overlay
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard # Tambahkan untuk Minikube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      tier: database
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # Postgres default user
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent

          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            readOnlyRootFilesystem: false # Postgres perlu write ke /var/lib/postgresql
            seccompProfile:
              type: RuntimeDefault

          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP

          # Environment variables
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: auth_db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"

          # Volume mount untuk persistent storage
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: pgdata # Lebih aman untuk backup/restore

          # Resources
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"

          # Liveness probe - cek apakah postgres siap
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - sama dengan liveness untuk postgres
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1

          # Startup probe - untuk database yang butuh waktu inisialisasi
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 30 # Maks 150 detik untuk startup

      # Volume definition
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

      # Node selector untuk production (opsional)
      # nodeSelector:
      #   node-type: database

      # Tolerations (opsional)
      # tolerations:
      #   - key: "database"
      #     operator: "Equal"
      #     value: "true"
      #     effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: database
  labels:
    app: postgres
    tier: database
spec:
  selector:
    app: postgres
    tier: database
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
      protocol: TCP
  type: ClusterIP
  # Tidak perlu session affinity untuk database
  sessionAffinity: None
